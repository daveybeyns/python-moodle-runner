<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Crash Course</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">

    <div class="top-strip">Python Crash Course</div>

    <section class="lesson-header">
      <div>
        <span class="course-tag">Python Crash Course</span>
        <h1>Lesson 1: Variables</h1>
        <p>Try the code, run it, then check your answer.</p>
      </div>
      <span class="status" id="status">Loading Python...</span>
    </section>

    <section class="task-box">
      <strong>Task:</strong> Create a variable called <code>name</code> and print it.
    </section>

    <section class="work-area">

      <div class="code-panel">
        <h2>Your code</h2>
        <textarea id="editor">name = "Dave"
print(name)</textarea>

        <div class="button-row">
          <button id="runBtn">Run</button>
          <button id="checkBtn">Check</button>
          <button id="resetBtn" class="secondary">Reset</button>
        </div>
      </div>

      <div class="output-panel">
        <h2>Output</h2>
        <pre id="output">Ready.</pre>
      </div>

    </section>

    <section class="feedback-section">
      <div id="feedback" class="feedback">Feedback appears here.</div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <script src="script.js"></script>
</body>
</html>
